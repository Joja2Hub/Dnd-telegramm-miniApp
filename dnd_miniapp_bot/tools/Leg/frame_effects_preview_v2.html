<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DND MiniApp - превью рамок v2</title>
  <style>
    :root {
      --bg: #080a10;
      --surface: rgba(14, 18, 28, .84);
      --surface-strong: rgba(21, 27, 39, .94);
      --line: rgba(235, 244, 255, .14);
      --line-strong: rgba(255, 255, 255, .26);
      --text: #f5f7fb;
      --muted: #9aa8b8;
      --warm: #f2bd5f;
      --green: #80d87b;
      --cyan: #59d8ff;
      --pink: #ff4ea3;
      --red: #ff5757;
      --violet: #a78bfa;
      --card-radius: 8px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -8%, rgba(242, 189, 95, .20), transparent 27%),
        radial-gradient(circle at 86% 4%, rgba(89, 216, 255, .18), transparent 26%),
        radial-gradient(circle at 74% 92%, rgba(255, 78, 163, .15), transparent 30%),
        linear-gradient(150deg, #07080d 0%, #10131c 48%, #090b10 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .26;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(to bottom, #000 0 45%, transparent 92%);
    }

    main {
      position: relative;
      width: min(1420px, 100%);
      margin: 0 auto;
      padding: 22px 14px 46px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      padding: 4px 0 18px;
    }

    .title-block {
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      color: #bfd0e4;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 980px;
      font-size: clamp(30px, 5vw, 64px);
      line-height: .98;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      max-width: 900px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .count-pill {
      justify-self: end;
      display: grid;
      min-width: 118px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--surface);
      text-align: right;
    }

    .count-pill b {
      font-size: 34px;
      line-height: 1;
    }

    .count-pill span {
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--card-radius);
      background: rgba(8, 10, 16, .76);
      backdrop-filter: blur(16px);
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button,
    input[type="search"],
    select {
      min-height: 38px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: var(--card-radius);
      background: rgba(255,255,255,.055);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 760;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    button:hover,
    button.active {
      border-color: color-mix(in srgb, var(--accent, var(--cyan)) 72%, white 0%);
      background: color-mix(in srgb, var(--accent, var(--cyan)) 18%, transparent);
      transform: translateY(-1px);
    }

    input[type="search"] {
      flex: 1 1 230px;
      min-width: 180px;
      padding: 0 12px;
    }

    select {
      padding: 0 34px 0 12px;
      color: #dce8f5;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .concept {
      --a: #f2bd5f;
      --b: #59d8ff;
      --c: #ff4ea3;
      position: relative;
      min-height: 362px;
      display: grid;
      grid-template-rows: 214px auto;
      gap: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background:
        radial-gradient(circle at 22% 0%, color-mix(in srgb, var(--a) 23%, transparent), transparent 38%),
        radial-gradient(circle at 92% 16%, color-mix(in srgb, var(--b) 17%, transparent), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.025)),
        var(--surface);
      box-shadow: 0 18px 54px rgba(0, 0, 0, .28);
      isolation: isolate;
    }

    .concept.hidden { display: none; }

    .concept::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: .42;
      background:
        linear-gradient(120deg, transparent 0 46%, rgba(255,255,255,.10) 47% 48%, transparent 49%),
        radial-gradient(circle at 50% 100%, color-mix(in srgb, var(--c) 18%, transparent), transparent 56%);
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 214px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.11), transparent 25%),
        linear-gradient(135deg, rgba(255,255,255,.035), transparent 52%);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 50%;
    }

    .portrait {
      position: relative;
      z-index: 4;
      width: 112px;
      height: 112px;
      overflow: hidden;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.22);
      background:
        radial-gradient(circle at 42% 18%, rgba(255,255,255,.24), transparent 21%),
        linear-gradient(145deg, #141a22, #05070c);
      box-shadow: inset 0 0 24px rgba(0,0,0,.42), 0 16px 32px rgba(0,0,0,.38);
    }

    .portrait img {
      width: 100%;
      height: 150%;
      object-fit: cover;
      object-position: 50% 0%;
      filter: saturate(.9) contrast(1.08);
      opacity: .92;
    }

    .frame,
    .frame::before,
    .frame::after,
    .halo,
    .halo::before,
    .halo::after,
    .detail,
    .detail::before,
    .detail::after,
    .spark,
    .spark::before,
    .spark::after {
      position: absolute;
      pointer-events: none;
      content: "";
    }

    .frame {
      z-index: 6;
      width: 158px;
      height: 158px;
      border-radius: 50%;
      border: 4px solid var(--a);
      filter: drop-shadow(0 0 14px color-mix(in srgb, var(--a) 48%, transparent));
    }

    .halo {
      z-index: 3;
      width: 186px;
      height: 186px;
      border-radius: 50%;
    }

    .detail {
      z-index: 7;
      width: 178px;
      height: 178px;
      border-radius: 50%;
    }

    .spark {
      z-index: 8;
      width: 178px;
      height: 178px;
      border-radius: 50%;
    }

    .meta {
      display: grid;
      gap: 9px;
      padding: 0 14px 15px;
    }

    .meta-row {
      display: grid;
      gap: 7px;
    }

    .theme {
      width: fit-content;
      padding: 4px 7px;
      border: 1px solid color-mix(in srgb, var(--a) 48%, transparent);
      border-radius: 6px;
      color: color-mix(in srgb, var(--a) 82%, white 18%);
      background: color-mix(in srgb, var(--a) 12%, transparent);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .tokens {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .token {
      padding: 4px 7px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.045);
      color: #c8d5e4;
      font-size: 11px;
      line-height: 1.1;
    }

    .fantasy { --accent: var(--warm); }
    .sci-fi { --accent: var(--cyan); }
    .cyberpunk { --accent: var(--pink); }

    .rarity-common { box-shadow: 0 18px 54px rgba(0,0,0,.24); }
    .rarity-rare { border-color: color-mix(in srgb, var(--b) 36%, rgba(255,255,255,.08)); }
    .rarity-epic { border-color: color-mix(in srgb, var(--c) 38%, rgba(255,255,255,.08)); }
    .rarity-legendary { border-color: color-mix(in srgb, var(--a) 52%, rgba(255,255,255,.10)); }

    .rune-choir .frame {
      border-style: dashed;
      border-width: 2px;
      background:
        conic-gradient(from 0deg, transparent 0 14deg, color-mix(in srgb, var(--a) 72%, transparent) 15deg 19deg, transparent 20deg 44deg);
      mask: radial-gradient(circle, transparent 59%, #000 61% 70%, transparent 72%);
      animation: spin 11s linear infinite;
    }
    .rune-choir .detail::before {
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 0%, var(--a) 0 3px, transparent 4px),
        radial-gradient(circle at 84% 18%, var(--b) 0 3px, transparent 4px),
        radial-gradient(circle at 100% 50%, var(--a) 0 3px, transparent 4px),
        radial-gradient(circle at 84% 82%, var(--b) 0 3px, transparent 4px),
        radial-gradient(circle at 50% 100%, var(--a) 0 3px, transparent 4px),
        radial-gradient(circle at 16% 82%, var(--b) 0 3px, transparent 4px),
        radial-gradient(circle at 0% 50%, var(--a) 0 3px, transparent 4px),
        radial-gradient(circle at 16% 18%, var(--b) 0 3px, transparent 4px);
      filter: drop-shadow(0 0 8px var(--a));
      animation: pulse 2.8s ease-in-out infinite;
    }

    .dragon-scale .frame {
      border: 0;
      background:
        conic-gradient(from 18deg, #431407 0 12deg, var(--a) 13deg 21deg, #7c2d12 22deg 35deg, var(--b) 36deg 41deg, #431407 42deg 54deg);
      mask: radial-gradient(circle, transparent 52%, #000 54% 71%, transparent 73%);
      animation: slow-rock 4.4s ease-in-out infinite;
    }
    .dragon-scale .spark::before {
      inset: -8px;
      background:
        radial-gradient(circle at 21% 78%, #ffef9a 0 3px, transparent 4px),
        radial-gradient(circle at 73% 21%, #ff6b2c 0 4px, transparent 5px),
        radial-gradient(circle at 84% 76%, #facc15 0 2px, transparent 3px),
        radial-gradient(circle at 31% 18%, #ff6b2c 0 2px, transparent 3px);
      filter: drop-shadow(0 0 9px #f97316);
      animation: ember-rise 2s ease-in-out infinite;
    }

    .sylvan-thorns .frame {
      border-color: #2f8f4d;
      box-shadow: inset 0 0 18px rgba(120, 216, 123, .24), 0 0 22px rgba(52, 211, 153, .18);
    }
    .sylvan-thorns .detail::before {
      inset: -10px;
      background: conic-gradient(from 5deg, transparent 0 21deg, rgba(128,216,123,.7) 22deg 26deg, transparent 27deg 44deg);
      mask: radial-gradient(circle, transparent 58%, #000 60% 67%, transparent 69%);
      animation: spin 16s linear infinite reverse;
    }
    .sylvan-thorns .spark::before {
      inset: 0;
      background:
        radial-gradient(ellipse at 18% 24%, rgba(211,255,172,.9) 0 5px, transparent 6px),
        radial-gradient(ellipse at 84% 72%, rgba(211,255,172,.82) 0 5px, transparent 6px);
      transform: rotate(-22deg);
    }

    .frost-crown .frame {
      border: 0;
      background: conic-gradient(from 0deg, transparent 0 9deg, rgba(217,249,255,.96) 10deg 13deg, rgba(89,216,255,.72) 14deg 20deg, transparent 21deg 38deg);
      mask: radial-gradient(circle, transparent 51%, #000 53% 75%, transparent 77%);
      filter: drop-shadow(0 0 13px rgba(125, 211, 252, .78));
      animation: frost-breathe 3.2s ease-in-out infinite;
    }
    .frost-crown .halo::before {
      inset: 16px;
      border-radius: 42% 58% 44% 56%;
      border: 1px solid rgba(217,249,255,.52);
      box-shadow: inset 0 0 20px rgba(217,249,255,.18), 0 0 20px rgba(89,216,255,.18);
      animation: water-shape 4s ease-in-out infinite;
    }

    .necro-reliquary .frame {
      border-color: #d4d4d8;
      border-style: double;
      box-shadow: 0 0 16px rgba(163, 230, 53, .20), inset 0 0 18px rgba(220, 252, 231, .16);
    }
    .necro-reliquary .detail::before {
      inset: -2px;
      background:
        linear-gradient(90deg, transparent 46%, rgba(220,252,231,.8) 47% 53%, transparent 54%),
        linear-gradient(0deg, transparent 46%, rgba(220,252,231,.8) 47% 53%, transparent 54%);
      mask: radial-gradient(circle, transparent 60%, #000 62% 66%, transparent 68%);
      animation: spin 13s steps(8) infinite;
    }
    .necro-reliquary .spark::after {
      inset: -4px;
      background:
        radial-gradient(ellipse at 28% 92%, rgba(132,255,174,.95) 0 4px, transparent 12px),
        radial-gradient(ellipse at 72% 92%, rgba(132,255,174,.95) 0 4px, transparent 12px);
      filter: drop-shadow(0 0 10px #84ffae);
      animation: candle 1.8s ease-in-out infinite;
    }

    .phoenix-ash .frame {
      border: 0;
      background:
        conic-gradient(from -40deg, transparent 0 15deg, rgba(255,87,87,.82) 16deg 28deg, #ffd166 29deg 34deg, transparent 35deg 72deg);
      mask: radial-gradient(circle, transparent 48%, #000 50% 76%, transparent 78%);
      animation: spin 7s linear infinite;
    }
    .phoenix-ash .detail::before {
      inset: 8px;
      border-radius: 50%;
      border-top: 2px solid rgba(255,218,142,.88);
      border-right: 7px solid rgba(255,87,87,.62);
      filter: drop-shadow(0 0 13px #ff5757);
      animation: pulse 2s ease-in-out infinite;
    }

    .moon-mirror .frame {
      border-color: rgba(207, 226, 255, .88);
      border-left-color: transparent;
      border-right-color: rgba(167, 139, 250, .72);
      box-shadow: inset 0 0 24px rgba(255,255,255,.12), 0 0 26px rgba(167,139,250,.22);
      animation: water-shape 5s ease-in-out infinite;
    }
    .moon-mirror .halo::after {
      inset: 28px 48px 28px 20px;
      border-radius: 50%;
      box-shadow: -11px 0 0 rgba(230,240,255,.9);
      filter: drop-shadow(0 0 12px rgba(230,240,255,.7));
      animation: moon-drift 3.8s ease-in-out infinite;
    }

    .royal-sigil .frame {
      border-radius: 18px;
      border-color: #d7b35d;
      transform: rotate(45deg);
      box-shadow: inset 0 0 18px rgba(215,179,93,.22), 0 0 24px rgba(167,139,250,.2);
    }
    .royal-sigil .detail::before {
      inset: 24px;
      border-radius: 50%;
      border: 2px solid rgba(167,139,250,.64);
      box-shadow: 0 0 16px rgba(167,139,250,.4);
    }
    .royal-sigil .spark::before {
      inset: 9px;
      background:
        radial-gradient(circle at 50% 0%, #fef3c7 0 4px, transparent 5px),
        radial-gradient(circle at 100% 50%, #fef3c7 0 4px, transparent 5px),
        radial-gradient(circle at 50% 100%, #fef3c7 0 4px, transparent 5px),
        radial-gradient(circle at 0% 50%, #fef3c7 0 4px, transparent 5px);
      animation: pulse 2.7s ease-in-out infinite;
    }

    .deep-root .frame {
      border: 0;
      background:
        conic-gradient(from 0deg, #4b2b16 0 12deg, #90d063 13deg 16deg, #261309 17deg 32deg, #8b5e34 33deg 37deg, #4b2b16 38deg 58deg);
      mask: radial-gradient(circle, transparent 52%, #000 54% 73%, transparent 75%);
    }
    .deep-root .detail::before {
      inset: -8px;
      background:
        linear-gradient(35deg, transparent 0 43%, rgba(128,216,123,.46) 44% 46%, transparent 47%),
        linear-gradient(145deg, transparent 0 57%, rgba(139,94,52,.82) 58% 60%, transparent 61%);
      mask: radial-gradient(circle, transparent 49%, #000 51% 66%, transparent 68%);
      animation: root-crawl 3.8s ease-in-out infinite;
    }

    .fae-moths .frame {
      border-color: rgba(251, 207, 232, .76);
      box-shadow: 0 0 23px rgba(244,114,182,.28), inset 0 0 18px rgba(255,255,255,.11);
    }
    .fae-moths .spark::before {
      inset: -10px;
      background:
        radial-gradient(ellipse at 17% 35%, rgba(252,231,243,.95) 0 4px, transparent 5px),
        radial-gradient(ellipse at 80% 26%, rgba(187,247,208,.95) 0 4px, transparent 5px),
        radial-gradient(ellipse at 72% 78%, rgba(254,240,138,.95) 0 4px, transparent 5px),
        radial-gradient(ellipse at 24% 82%, rgba(191,219,254,.95) 0 4px, transparent 5px);
      filter: drop-shadow(0 0 8px rgba(251,207,232,.9));
      animation: fae-loop 4.2s ease-in-out infinite;
    }

    .orbital-dock .frame {
      border-width: 1px;
      border-color: rgba(89,216,255,.5);
    }
    .orbital-dock .frame::before,
    .orbital-dock .frame::after {
      inset: -8px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--b);
      border-bottom-color: rgba(255,255,255,.44);
      animation: spin 2.4s linear infinite;
    }
    .orbital-dock .frame::after {
      inset: 14px;
      border-width: 1px;
      border-left-color: var(--a);
      animation-duration: 5.4s;
      animation-direction: reverse;
    }

    .quantum-hexgrid .frame {
      border: 0;
      border-radius: 0;
      clip-path: polygon(50% 0, 94% 25%, 94% 75%, 50% 100%, 6% 75%, 6% 25%);
      background: linear-gradient(135deg, var(--b), var(--c));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      padding: 5px;
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: hex-pop 3s ease-in-out infinite;
    }
    .quantum-hexgrid .detail::before {
      inset: -8px;
      background:
        repeating-linear-gradient(60deg, rgba(89,216,255,.28) 0 2px, transparent 3px 18px),
        repeating-linear-gradient(120deg, rgba(167,139,250,.18) 0 2px, transparent 3px 20px);
      clip-path: polygon(50% 0, 94% 25%, 94% 75%, 50% 100%, 6% 75%, 6% 25%);
      mask: radial-gradient(circle, transparent 45%, #000 47% 69%, transparent 72%);
    }

    .reactor-torus .frame {
      border-color: rgba(89,216,255,.72);
      box-shadow: inset 0 0 18px rgba(89,216,255,.2), 0 0 26px rgba(89,216,255,.25);
      animation: reactor 1.8s ease-in-out infinite;
    }
    .reactor-torus .halo::before {
      inset: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, transparent 46%, rgba(89,216,255,.16) 48%, rgba(255,78,163,.55) 52%, transparent 64%);
      animation: spin 3.3s linear infinite;
    }

    .stasis-brackets .frame {
      border: 0;
      border-radius: 0;
      background:
        linear-gradient(var(--b), var(--b)) left top / 42px 4px no-repeat,
        linear-gradient(var(--b), var(--b)) left top / 4px 42px no-repeat,
        linear-gradient(var(--b), var(--b)) right top / 42px 4px no-repeat,
        linear-gradient(var(--b), var(--b)) right top / 4px 42px no-repeat,
        linear-gradient(var(--b), var(--b)) left bottom / 42px 4px no-repeat,
        linear-gradient(var(--b), var(--b)) left bottom / 4px 42px no-repeat,
        linear-gradient(var(--b), var(--b)) right bottom / 42px 4px no-repeat,
        linear-gradient(var(--b), var(--b)) right bottom / 4px 42px no-repeat;
      filter: drop-shadow(0 0 12px rgba(89,216,255,.74));
      animation: stasis 2s steps(2) infinite;
    }
    .stasis-brackets .detail::after {
      inset: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.32);
      box-shadow: 0 0 0 8px rgba(89,216,255,.05), 0 0 0 18px rgba(89,216,255,.035);
      animation: pulse 2.6s ease-in-out infinite;
    }

    .gravity-lens .frame {
      width: 188px;
      height: 118px;
      border-width: 2px;
      border-color: rgba(89,216,255,.62);
      transform: rotate(-18deg);
      box-shadow: 0 0 22px rgba(89,216,255,.26);
      animation: orbit-tilt 4s ease-in-out infinite;
    }
    .gravity-lens .detail::before {
      inset: 28px -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.2);
      transform: rotate(24deg);
    }

    .cryo-chamber .frame {
      border-radius: 28px;
      border-color: rgba(184,242,255,.8);
      background:
        linear-gradient(90deg, transparent 0 42%, rgba(184,242,255,.25) 43% 57%, transparent 58%),
        linear-gradient(0deg, transparent 0 42%, rgba(184,242,255,.20) 43% 57%, transparent 58%);
      box-shadow: inset 0 0 28px rgba(184,242,255,.14), 0 0 22px rgba(89,216,255,.18);
    }
    .cryo-chamber .spark::after {
      inset: -4px;
      background: repeating-linear-gradient(90deg, transparent 0 17px, rgba(184,242,255,.5) 18px 20px, transparent 21px 35px);
      mask: radial-gradient(circle, transparent 56%, #000 59% 66%, transparent 69%);
      animation: scan-x 2.3s linear infinite;
    }

    .telemetry-array .frame {
      border: 0;
      background: conic-gradient(from 0deg, rgba(89,216,255,.86) 0 2deg, transparent 3deg 9deg, rgba(255,255,255,.38) 10deg 12deg, transparent 13deg 22deg);
      mask: radial-gradient(circle, transparent 54%, #000 56% 66%, transparent 68%);
      animation: spin 18s steps(72) infinite;
    }
    .telemetry-array .detail::after {
      inset: 14px;
      border-radius: 50%;
      border: 1px dashed rgba(89,216,255,.46);
      animation: spin 7s linear infinite reverse;
    }

    .drone-swarm .frame {
      border-color: rgba(89,216,255,.36);
      border-style: dotted;
    }
    .drone-swarm .spark::before {
      inset: -12px;
      background:

    @keyframes stasis { 0%,100% { opacity: .55; transform: scale(.98); } 50% { opacity: 1; transform: scale(1.02); } }

<body>
  <main>
    <header class="topbar">
      <div class="title-block">
        <span class="eyebrow">DND MiniApp / frame effect concepts</span>

      </div>
      <div class="count-pill"><b id="visibleCount">30</b><span>видно концептов</span></div>

        <option value="rare">Rare</option>
        <option value="epic">Epic</option>
        <option value="legendary">Legendary</option>

    <section class="gallery" id="gallery" aria-live="polite"></section>
  </main>

      { id: 'synthwave-grill', theme: 'cyberpunk', rarity: 'common', name: 'Синтвейв-решётка', desc: 'Горизонтальные неоновые полосы вокруг профиля, как вывеска ночного клуба.', tags: ['синтвейв', 'полосы', 'клуб'], colors: ['#ff4ea3', '#59d8ff', '#7c3aed'] },
      { id: 'toxic-billboard', theme: 'cyberpunk', rarity: 'epic', name: 'Токсичный билборд', desc: 'Кислотная предупреждающая окантовка с мерцанием аварийного знака.', tags: ['токсин', 'авария', 'жёлтый'], colors: ['#d9ff42', '#10140b', '#59d8ff'] },
      { id: 'chrome-wire', theme: 'cyberpunk', rarity: 'rare', name: 'Хромовая проводка', desc: 'Серебряный обод, циановые дорожки и розовые контакты по цепи.', tags: ['хром', 'проводка', 'цепь'], colors: ['#e5e7eb', '#59d8ff', '#ff4ea3'] },
      { id: 'pink-noise', theme: 'cyberpunk', rarity: 'common', name: 'Розовый шум', desc: 'Пиксельные вспышки прыгают вокруг рамки, оставляя ощущение сбоя сигнала.', tags: ['пиксели', 'шум', 'сбой'], colors: ['#ff4ea3', '#59d8ff', '#ffd166'] },
      { id: 'black-market-chip', theme: 'cyberpunk', rarity: 'epic', name: 'Чёрный чип', desc: 'Прямоугольная микросхема с бегущими контактами по внешнему контуру.', tags: ['чип', 'рынок', 'контакты'], colors: ['#ffffff', '#59d8ff', '#ff4ea3'] },
      { id: 'overclock-heat', theme: 'cyberpunk', rarity: 'legendary', name: 'Перегрев разгона', desc: 'Быстрые горячие дуги и реакторное дыхание для агрессивных билдов.', tags: ['разгон', 'жар', 'скорость'], colors: ['#ff5757', '#ffd166', '#ff4ea3'] }
    ];

    const themeLabels = {
      fantasy: 'Fantasy',
      'sci-fi': 'Sci-fi',
      cyberpunk: 'Cyberpunk'
    };

    const rarityLabels = {
      common: 'Common',
      rare: 'Rare',
      epic: 'Epic',
      legendary: 'Legendary'
    };

    const gallery = document.querySelector('#gallery');
    const searchInput = document.querySelector('#searchInput');
    const rarityFilter = document.querySelector('#rarityFilter');
    const visibleCount = document.querySelector('#visibleCount');
    let activeTheme = 'all';

    function cardTemplate(item) {
      const searchText = [item.name, item.desc, item.theme, item.rarity, ...item.tags].join(' ').toLowerCase();
      return `
        <article class="concept ${item.theme} rarity-${item.rarity} ${item.id}" data-theme="${item.theme}" data-rarity="${item.rarity}" data-search="${searchText}" style="--a:${item.colors[0]};--b:${item.colors[1]};--c:${item.colors[2]}">
          <div class="stage">
            <span class="halo"></span>
            <span class="frame"></span>
            <span class="detail"></span>
            <span class="spark"></span>
            <div class="portrait">
              <img src="./inventory_body_cutout.png" alt="" loading="lazy" />
            </div>
          </div>
          <div class="meta">
            <div class="meta-row">
              <span class="theme">${themeLabels[item.theme]} / ${rarityLabels[item.rarity]}</span>
              <h2>${item.name}</h2>
            </div>
            <p class="desc">${item.desc}</p>
            <div class="tokens">${item.tags.map(tag => `<span class="token">${tag}</span>`).join('')}</div>
          </div>
        </article>
      `;
    }

    function render() {
      gallery.innerHTML = concepts.map(cardTemplate).join('');
      applyFilters();
    }

    function applyFilters() {
      const query = searchInput.value.trim().toLowerCase();
      const rarity = rarityFilter.value;
      let count = 0;

      gallery.querySelectorAll('.concept').forEach(card => {
        const themeMatch = activeTheme === 'all' || card.dataset.theme === activeTheme;
        const rarityMatch = rarity === 'all' || card.dataset.rarity === rarity;
        const searchMatch = !query || card.dataset.search.includes(query);
        const visible = themeMatch && rarityMatch && searchMatch;
        card.classList.toggle('hidden', !visible);
        if (visible) count += 1;
      });

      visibleCount.textContent = String(count);
    }

    document.querySelector('#themeFilters').addEventListener('click', event => {
      const button = event.target.closest('button[data-theme]');
      if (!button) return;
      activeTheme = button.dataset.theme;
      document.querySelectorAll('#themeFilters button').forEach(btn => {
        btn.classList.toggle('active', btn === button);
      });
      applyFilters();
    });

    searchInput.addEventListener('input', applyFilters);
    rarityFilter.addEventListener('change', applyFilters);

    render();
  </script>
</body>
</html>

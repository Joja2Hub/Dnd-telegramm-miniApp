<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f5f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box {
      width: min(420px, calc(100% - 32px));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      background: #151b24;
      padding: 18px;
      text-align: center;
    }
    a { color: #ffd166; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Вход</h1>
    <p id="status">Готовлю локальную сессию...</p>
    <p><a href="/local/">Вернуться к выбору персонажа</a></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search || '');
    const localTgId = params.get('local_tg_id') || '';
    const localCharacterId = params.get('local_character_id') || '';
    const localCampaignId = params.get('campaign_id') || '';
    const localUsername = params.get('local_tg_username') || '';
    const localFirstName = params.get('local_tg_first_name') || localUsername || '';

    if (!localTgId) {
      document.getElementById('status').textContent = 'Не хватает данных для локального входа.';
    } else {
      localStorage.setItem('dev_tg_id', localTgId);
      if (localUsername) localStorage.setItem('dev_tg_username', localUsername.replace(/^@+/, ''));
      if (localFirstName) localStorage.setItem('dev_tg_first_name', localFirstName);
      if (localCharacterId) localStorage.setItem('dev_view_character_id', localCharacterId);
      else localStorage.removeItem('dev_view_character_id');
      if (localCampaignId) localStorage.setItem('campaign_id', localCampaignId);
      else localStorage.removeItem('campaign_id');
      localStorage.setItem('local_host_mode', localCharacterId ? 'player' : 'host');
      const appParams = new URLSearchParams({
        local_tg_id: localTgId,
      });
      if (localCampaignId) appParams.set('campaign_id', localCampaignId);
      if (localCharacterId) appParams.set('local_character_id', localCharacterId);
      if (localUsername) appParams.set('local_tg_username', localUsername);
      if (localFirstName) appParams.set('local_tg_first_name', localFirstName);
      window.location.replace(`/local-app/?${appParams.toString()}`);
    }
  </script>
</body>
</html>
